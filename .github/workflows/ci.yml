name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository:
    name: Repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Check repository layout
        shell: bash
        run: |
          test -f README.md
          test -f LICENSE.md
          test -f R/binsreg/DESCRIPTION
          test -f Python/binsreg/pyproject.toml
          test -f Python/binsreg/setup.cfg
          test -f stata/stata.toc
          test -f stata/binsreg.pkg
          grep -qx 'p binsreg' stata/stata.toc
          awk '$1 == "f" {print $2}' stata/binsreg.pkg | while read -r file; do
            test -f "stata/${file}"
          done

  python-build:
    name: Python build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Install Python package
        run: python -m pip install -e Python/binsreg

      - name: Check Python package import
        run: |
          python -m compileall -q Python/binsreg/src/binsreg
          python -c "import binsreg; print('binsreg import OK')"

      - name: Build Python package
        run: python -m build Python/binsreg

  r-check:
    name: R CMD check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install R dependencies
        run: |
          repos <- c(RSPM = Sys.getenv("RSPM"), CRAN = "https://cloud.r-project.org")
          install.packages(
            c("ggplot2", "sandwich", "quantreg", "matrixStats", "testthat"),
            repos = repos
          )
        shell: Rscript {0}

      - name: Build R source package
        run: R CMD build R/binsreg

      - name: Check R package
        run: R CMD check binsreg_*.tar.gz --no-manual
